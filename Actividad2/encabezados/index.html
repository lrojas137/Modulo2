<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba iframe</title>
</head>
<body>
    <!-- Archivo usado para comprobar el funcionamiento de X-Frame-Options -->
    <h1>Prueba de iframe</h1>

    <!-- Esta carga debe ser bloqueada por el encabezado X-Frame-Options: deny -->
    <iframe src="http://localhost/encabezados/" width="800" height="400"></iframe>
</body>
</html>
